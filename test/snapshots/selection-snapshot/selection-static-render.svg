    <text x="63" y="342" fill="#00cdcd" textLength="72" lengthAdjust="spacingAndGlyphs">greeting</text>
    <text x="135" y="342" fill="#ffffff" textLength="27" lengthAdjust="spacingAndGlyphs"> + </text>
    <text x="162" y="342" fill="#00cd00" textLength="36" lengthAdjust="spacingAndGlyphs">&quot;, &quot;</text>
    <text x="198" y="342" fill="#ffffff" textLength="162" lengthAdjust="spacingAndGlyphs"> +    ││          </text>
    <text x="0" y="359" fill="#ffffff" textLength="45" lengthAdjust="spacingAndGlyphs">││   </text>
    <text x="45" y="359" fill="#00cdcd" textLength="36" lengthAdjust="spacingAndGlyphs">name</text>
    <text x="81" y="359" fill="#ffffff" textLength="27" lengthAdjust="spacingAndGlyphs"> + </text>
    <text x="108" y="359" fill="#00cd00" textLength="81" lengthAdjust="spacingAndGlyphs">&quot; (wrap)&quot;</text>
