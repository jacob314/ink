    <text x="0" y="495" fill="#ffffff" textLength="360" lengthAdjust="spacingAndGlyphs">anchorPoint: undefined                  </text>
    <text x="0" y="512" fill="#ffffff" textLength="360" lengthAdjust="spacingAndGlyphs">focusPoint: undefined                   </text>
    <text x="0" y="529" fill="#ffffff" textLength="360" lengthAdjust="spacingAndGlyphs">┌──────────────────────────────────────┐</text>
    <text x="0" y="546" fill="#ffffff" textLength="360" lengthAdjust="spacingAndGlyphs">│Selected Text:                        │</text>
    <text x="0" y="563" fill="#ffffff" textLength="360" lengthAdjust="spacingAndGlyphs">└──────────────────────────────────────┘</text>
    <text x="0" y="597" fill="#ffffff" textLength="360" lengthAdjust="spacingAndGlyphs">Press &apos;t&apos; to toggle selection           </text>
    <text x="0" y="614" fill="#ffffff" textLength="360" lengthAdjust="spacingAndGlyphs">visibility.                             </text>
    <text x="0" y="631" fill="#ffffff" textLength="360" lengthAdjust="spacingAndGlyphs">Press &apos;m&apos; to toggle StaticRender        </text>
    <text x="0" y="648" fill="#ffffff" textLength="360" lengthAdjust="spacingAndGlyphs">(current: ON).                          </text>
    <text x="0" y="665" fill="#ffffff" textLength="360" lengthAdjust="spacingAndGlyphs">Press &apos;space&apos; to toggle line number     </text>
    <text x="0" y="682" fill="#ffffff" textLength="360" lengthAdjust="spacingAndGlyphs">selection.                              </text>
    <text x="0" y="699" fill="#ffffff" textLength="360" lengthAdjust="spacingAndGlyphs">Press &apos;s&apos; to select character under     </text>
    <text x="0" y="716" fill="#ffffff" textLength="360" lengthAdjust="spacingAndGlyphs">cursor.                                 </text>
    <text x="0" y="733" fill="#ffffff" textLength="360" lengthAdjust="spacingAndGlyphs">Use Arrow keys to move cursor.          </text>
    <text x="0" y="750" fill="#ffffff" textLength="360" lengthAdjust="spacingAndGlyphs">Shift+Arrow to select.                  </text>
