    <text x="45" y="308" fill="#cd00cd" textLength="45" lengthAdjust="spacingAndGlyphs">const</text>
    <text x="99" y="308" fill="#00cdcd" textLength="36" lengthAdjust="spacingAndGlyphs">name</text>
    <text x="135" y="308" fill="#ffffff" textLength="27" lengthAdjust="spacingAndGlyphs"> = </text>
    <text x="162" y="308" fill="#00cd00" textLength="63" lengthAdjust="spacingAndGlyphs">&quot;World&quot;</text>
