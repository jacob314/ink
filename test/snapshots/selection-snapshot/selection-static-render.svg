    <text x="144" y="53" fill="#ffffff" textLength="216" lengthAdjust="spacingAndGlyphs">            ││          </text>
    <text x="0" y="70" fill="#ffffff" textLength="360" lengthAdjust="spacingAndGlyphs">│└──────────────────────────┘│          </text>
