    <text x="117" y="325" fill="#cdcd00" textLength="27" lengthAdjust="spacingAndGlyphs">log</text>
    <text x="144" y="325" fill="#ffffff" textLength="216" lengthAdjust="spacingAndGlyphs">(           ││          </text>
