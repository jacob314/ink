    <text x="0" y="359" fill="#5e6065" textLength="9" lengthAdjust="spacingAndGlyphs">│</text>
    <text x="27" y="359" fill="#afafaf" textLength="9" lengthAdjust="spacingAndGlyphs">1</text>
    <text x="45" y="359" fill="#ffffff" textLength="342" lengthAdjust="spacingAndGlyphs">In shadows they creep, on velvet paws,</text>
    <text x="999" y="359" fill="#5e6065" textLength="9" lengthAdjust="spacingAndGlyphs">│</text>
    <text x="0" y="376" fill="#5e6065" textLength="9" lengthAdjust="spacingAndGlyphs">│</text>
    <text x="27" y="376" fill="#afafaf" textLength="9" lengthAdjust="spacingAndGlyphs">2</text>
    <text x="45" y="376" fill="#ffffff" textLength="342" lengthAdjust="spacingAndGlyphs">With twitching tails and hidden claws.</text>
    <text x="999" y="376" fill="#5e6065" textLength="9" lengthAdjust="spacingAndGlyphs">│</text>
    <text x="0" y="393" fill="#5e6065" textLength="9" lengthAdjust="spacingAndGlyphs">│</text>
    <text x="27" y="393" fill="#afafaf" textLength="9" lengthAdjust="spacingAndGlyphs">3</text>
    <text x="45" y="393" fill="#ffffff" textLength="315" lengthAdjust="spacingAndGlyphs">A purr that rumbles, soft and deep,</text>
    <text x="999" y="393" fill="#5e6065" textLength="9" lengthAdjust="spacingAndGlyphs">│</text>
    <text x="0" y="410" fill="#5e6065" textLength="9" lengthAdjust="spacingAndGlyphs">│</text>
    <text x="27" y="410" fill="#afafaf" textLength="9" lengthAdjust="spacingAndGlyphs">4</text>
    <text x="45" y="410" fill="#ffffff" textLength="288" lengthAdjust="spacingAndGlyphs">Before they curl up fast asleep.</text>
    <text x="999" y="410" fill="#5e6065" textLength="9" lengthAdjust="spacingAndGlyphs">│</text>
    <text x="0" y="427" fill="#5e6065" textLength="9" lengthAdjust="spacingAndGlyphs">│</text>
    <text x="27" y="427" fill="#afafaf" textLength="9" lengthAdjust="spacingAndGlyphs">5</text>
    <text x="999" y="427" fill="#5e6065" textLength="9" lengthAdjust="spacingAndGlyphs">│</text>
    <text x="0" y="444" fill="#5e6065" textLength="9" lengthAdjust="spacingAndGlyphs">│</text>
    <text x="27" y="444" fill="#afafaf" textLength="9" lengthAdjust="spacingAndGlyphs">6</text>
    <text x="45" y="444" fill="#ffffff" textLength="279" lengthAdjust="spacingAndGlyphs">Eyes of emerald, gold, or blue,</text>
    <text x="999" y="444" fill="#5e6065" textLength="9" lengthAdjust="spacingAndGlyphs">│</text>
    <text x="0" y="461" fill="#5e6065" textLength="9" lengthAdjust="spacingAndGlyphs">│</text>
    <text x="27" y="461" fill="#afafaf" textLength="9" lengthAdjust="spacingAndGlyphs">7</text>
    <text x="45" y="461" fill="#ffffff" textLength="261" lengthAdjust="spacingAndGlyphs">Always watching, judging you.</text>
    <text x="999" y="461" fill="#5e6065" textLength="9" lengthAdjust="spacingAndGlyphs">│</text>
    <text x="0" y="478" fill="#5e6065" textLength="9" lengthAdjust="spacingAndGlyphs">│</text>
    <text x="27" y="478" fill="#afafaf" textLength="9" lengthAdjust="spacingAndGlyphs">8</text>
    <text x="45" y="478" fill="#ffffff" textLength="261" lengthAdjust="spacingAndGlyphs">Masters of the sunlit square,</text>
    <text x="999" y="478" fill="#5e6065" textLength="9" lengthAdjust="spacingAndGlyphs">│</text>
    <text x="0" y="495" fill="#5e6065" textLength="9" lengthAdjust="spacingAndGlyphs">│</text>
    <text x="27" y="495" fill="#afafaf" textLength="9" lengthAdjust="spacingAndGlyphs">9</text>
    <text x="45" y="495" fill="#ffffff" textLength="261" lengthAdjust="spacingAndGlyphs">Sleeping softly on the chair.</text>
    <text x="999" y="495" fill="#5e6065" textLength="9" lengthAdjust="spacingAndGlyphs">│</text>
    <text x="0" y="512" fill="#5e6065" textLength="9" lengthAdjust="spacingAndGlyphs">│</text>
    <text x="18" y="512" fill="#afafaf" textLength="18" lengthAdjust="spacingAndGlyphs">10</text>
    <text x="999" y="512" fill="#5e6065" textLength="9" lengthAdjust="spacingAndGlyphs">│</text>
    <text x="0" y="529" fill="#5e6065" textLength="9" lengthAdjust="spacingAndGlyphs">│</text>
    <text x="18" y="529" fill="#afafaf" textLength="18" lengthAdjust="spacingAndGlyphs">11</text>
    <text x="45" y="529" fill="#ffffff" textLength="315" lengthAdjust="spacingAndGlyphs">Fierce little hunters of the night,</text>
    <text x="999" y="529" fill="#5e6065" textLength="9" lengthAdjust="spacingAndGlyphs">│</text>
    <text x="0" y="546" fill="#5e6065" textLength="9" lengthAdjust="spacingAndGlyphs">│</text>
