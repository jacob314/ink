<svg xmlns="http://www.w3.org/2000/svg" width="1064" height="360" viewBox="0 0 1064 360">
  <style>
    text { font-family: Consolas, "Courier New", monospace; font-size: 14px; dominant-baseline: text-before-edge; white-space: pre; }
  </style>
  <rect width="1064" height="360" fill="#000000" />
  <g transform="translate(10, 10)">
    <text x="0" y="2" fill="#ffffff" textLength="1044" lengthAdjust="spacingAndGlyphs">                                                                                                                   █</text>
    <text x="0" y="19" fill="#ffffff" textLength="1044" lengthAdjust="spacingAndGlyphs"> Line 1                                                                                                            █</text>
    <text x="9" y="36" fill="#00cdcd" textLength="189" lengthAdjust="spacingAndGlyphs">Sticky Inner Header 0</text>
    <text x="198" y="36" fill="#ffffff" textLength="846" lengthAdjust="spacingAndGlyphs">                                                                                             █</text>
    <text x="18" y="53" fill="#00cdcd" textLength="306" lengthAdjust="spacingAndGlyphs">Sticky Inner Header 0 (sticky top)</text>
    <text x="324" y="53" fill="#ffffff" textLength="720" lengthAdjust="spacingAndGlyphs">                                                                               █</text>
    <text x="0" y="70" fill="#ffffff" textLength="1044" lengthAdjust="spacingAndGlyphs">                                                                                                                   █</text>
    <text x="18" y="87" fill="#7f7f7f" textLength="243" lengthAdjust="spacingAndGlyphs">[body line for header 0] 42</text>
    <text x="261" y="87" fill="#ffffff" textLength="783" lengthAdjust="spacingAndGlyphs">                                                                                      █</text>
    <text x="18" y="104" fill="#7f7f7f" textLength="252" lengthAdjust="spacingAndGlyphs">[body line for header 0] 432</text>
    <text x="270" y="104" fill="#ffffff" textLength="774" lengthAdjust="spacingAndGlyphs">                                                                                   █ █</text>
    <text x="18" y="121" fill="#7f7f7f" textLength="252" lengthAdjust="spacingAndGlyphs">[body line for header 0] 443</text>
    <text x="270" y="121" fill="#ffffff" textLength="774" lengthAdjust="spacingAndGlyphs">                                                                                    ██</text>
    <text x="18" y="138" fill="#7f7f7f" textLength="252" lengthAdjust="spacingAndGlyphs">[body line for header 0] 454</text>
    <text x="270" y="138" fill="#ffffff" textLength="774" lengthAdjust="spacingAndGlyphs">                                                                                     █</text>
    <text x="18" y="155" fill="#7f7f7f" textLength="252" lengthAdjust="spacingAndGlyphs">[body line for header 0] 465</text>
    <text x="270" y="155" fill="#ffffff" textLength="774" lengthAdjust="spacingAndGlyphs">                                                                                     █</text>
    <text x="18" y="172" fill="#7f7f7f" textLength="252" lengthAdjust="spacingAndGlyphs">[body line for header 0] 476</text>
    <text x="0" y="189" fill="#ffffff" textLength="1044" lengthAdjust="spacingAndGlyphs">This is a demo showing a scrollable box with sticky headers.                                                        </text>
    <text x="0" y="206" fill="#ffffff" textLength="1044" lengthAdjust="spacingAndGlyphs">Press up/down arrow or w/s to scroll vertically (w/s for 30 lines, Shift for 10).                                   </text>
    <text x="0" y="223" fill="#ffffff" textLength="1044" lengthAdjust="spacingAndGlyphs">Press &apos;space&apos; to add a block, &apos;c&apos; to clear list.                                                                    </text>
    <text x="0" y="240" fill="#ffffff" textLength="1044" lengthAdjust="spacingAndGlyphs">Press &apos;b&apos; to toggle scrollbar (on), &apos;t&apos; to toggle border.                                                           </text>
    <text x="0" y="257" fill="#ffffff" textLength="1044" lengthAdjust="spacingAndGlyphs">Press &apos;f&apos; to collapse footer, &apos;a&apos; to toggle alternate buffer + sticky headers (current: off)                        </text>
    <text x="0" y="274" fill="#ffffff" textLength="1044" lengthAdjust="spacingAndGlyphs">Press &apos;h&apos; to toggle sticky headers in backbuffer (current: off)                                                     </text>
    <text x="0" y="291" fill="#ffffff" textLength="1044" lengthAdjust="spacingAndGlyphs">Press &apos;v&apos; to toggle stable scrollback (on)                                                                          </text>
    <text x="0" y="308" fill="#ffffff" textLength="1044" lengthAdjust="spacingAndGlyphs">Press &apos;e&apos; to export current frame, &apos;r&apos; to toggle recording (OFF)                                                    </text>
    <text x="0" y="325" fill="#ffffff" textLength="1044" lengthAdjust="spacingAndGlyphs">ScrollTop: 0, Size: 9, Content: 12, Added Scroll: 0                                                                 </text>
  </g>
</svg>